version: "3"

# Dev / tooling tasks.
# Build tasks (make build, make docker-build, etc.) live in Makefile.

tasks:
  install:
    desc: Install project dependencies
    cmds:
      - npm ci

  dev:
    desc: Start Next.js development server
    cmds:
      - npm run dev

  lint:
    desc: Run ESLint across the project
    cmds:
      - npm run lint

  lint:fix:
    desc: Run ESLint and auto-fix fixable issues
    cmds:
      - npm run lint -- --fix

  test:
    desc: Run test suite
    cmds:
      - npm test

  clean:
    desc: Remove build artifacts and node_modules
    cmds:
      - rm -rf .next node_modules

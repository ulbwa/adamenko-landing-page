version: "3"

tasks:
  install:
    desc: Install project dependencies
    cmds:
      - npm ci

  dev:
    desc: Start development server
    cmds:
      - npm run dev

  build:
    desc: Create production build
    cmds:
      - npm run build

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  start:
    desc: Start production server (run build first)
    cmds:
      - npm run start

  clean:
    desc: Remove build artifacts and node_modules
    cmds:
      - rm -rf .next node_modules

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t adamenko-landing-page:latest .

  docker:run:
    desc: Run Docker container locally on port 3000
    cmds:
      - docker run -p 3000:3000 adamenko-landing-page:latest
